<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <circle cx="150" cy="150" r="140" fill="#FDF6EC" stroke="#D4B896" stroke-width="1"/>

  <!-- Laurel branches -->
  <!-- Left branch -->
  <g transform="translate(55, 200) rotate(-15)" stroke="#8B7D6B" stroke-width="1.2" fill="none">
    <path d="M40,0 Q30,-30 25,-70 Q20,-110 30,-150"/>
    <ellipse cx="20" cy="-30" rx="8" ry="15" transform="rotate(-20, 20, -30)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="15" cy="-55" rx="7" ry="13" transform="rotate(-25, 15, -55)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="15" cy="-80" rx="7" ry="12" transform="rotate(-30, 15, -80)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="18" cy="-105" rx="6" ry="11" transform="rotate(-35, 18, -105)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="23" cy="-127" rx="5" ry="10" transform="rotate(-40, 23, -127)" stroke="#8B7D6B" fill="none"/>
  </g>
  <!-- Right branch -->
  <g transform="translate(245, 200) rotate(15) scale(-1,1)" stroke="#8B7D6B" stroke-width="1.2" fill="none">
    <path d="M40,0 Q30,-30 25,-70 Q20,-110 30,-150"/>
    <ellipse cx="20" cy="-30" rx="8" ry="15" transform="rotate(-20, 20, -30)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="15" cy="-55" rx="7" ry="13" transform="rotate(-25, 15, -55)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="15" cy="-80" rx="7" ry="12" transform="rotate(-30, 15, -80)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="18" cy="-105" rx="6" ry="11" transform="rotate(-35, 18, -105)" stroke="#8B7D6B" fill="none"/>
    <ellipse cx="23" cy="-127" rx="5" ry="10" transform="rotate(-40, 23, -127)" stroke="#8B7D6B" fill="none"/>
  </g>

  <!-- Bee body -->
  <g transform="translate(150, 140)">
    <!-- Wings -->
    <ellipse cx="-18" cy="-20" rx="16" ry="22" transform="rotate(-15)" fill="none" stroke="#8B7D6B" stroke-width="1.2"/>
    <ellipse cx="18" cy="-20" rx="16" ry="22" transform="rotate(15)" fill="none" stroke="#8B7D6B" stroke-width="1.2"/>
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="12" ry="20" fill="none" stroke="#4A3728" stroke-width="1.5"/>
    <!-- Stripes -->
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#4A3728" stroke-width="1.2"/>
    <line x1="-11" y1="4" x2="11" y2="4" stroke="#4A3728" stroke-width="1.2"/>
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#4A3728" stroke-width="1.2"/>
    <!-- Head -->
    <circle cx="0" cy="-18" r="7" fill="none" stroke="#4A3728" stroke-width="1.5"/>
    <!-- Antennae -->
    <path d="M-3,-24 Q-8,-35 -12,-38" stroke="#4A3728" stroke-width="1" fill="none"/>
    <path d="M3,-24 Q8,-35 12,-38" stroke="#4A3728" stroke-width="1" fill="none"/>
    <circle cx="-12" cy="-38" r="1.5" fill="#4A3728"/>
    <circle cx="12" cy="-38" r="1.5" fill="#4A3728"/>
    <!-- Stinger -->
    <path d="M0,25 L0,30" stroke="#4A3728" stroke-width="1.2"/>
  </g>

  <!-- Text: HAPPY HIVES -->
  <text x="150" y="85" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="300" letter-spacing="8" fill="#4A3728">HAPPY HIVES</text>

  <!-- Text: MISSOURI BEE FARM -->
  <text x="150" y="230" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="14" font-weight="300" letter-spacing="4" fill="#8B7D6B">MISSOURI BEE FARM</text>
</svg>
